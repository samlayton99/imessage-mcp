# conditions.yaml — everything you steer, in one place. Defaults equal the designed behavior.
# Secrets (API keys, server tokens) live next to this in .env, never here.

# ── 1. TEXT MESSAGE RULES ─ what gets read & summarized ──────────────────────
messages:
  weekly_days: 7
  monthly_days: 30
  context_messages: 10            # EXTRACTION lead-in: extra older msgs pulled in just BEFORE a window
                                  # so a thread isn't cut mid-conversation. NOT an LLM-input cap. 0 = none.
  unresponded_lookback_days: 90   # how far back a 1:1 counts as a stale "owe a reply"
  include_groups: true
  named_only: false               # true = only address-book contacts
  min_handle_digits: 10           # drop shortcodes / sub-10-digit senders (e.g. '38792')
  spam_floor: 1                   # STORAGE: drop conversations with fewer than this many ALL-TIME
                                  # messages (tapbacks counted) — spam / one-offs never reach the server. 1 = keep all.
  backfill_years: 3               # how far back the collector mirrors a conversation's full history on admission
  summarize_floor: 5              # SUMMARIZE: daily skips a conversation with fewer than this many NEW
                                  # messages since its last summary (it stays in raw history). 0 = no gate.

# ── 2. MODELS & BILLING ─ who runs each summary, and how you pay ─────────────
engine:
  provider: litellm               # litellm = any provider via API key (incl. Claude API) | agent_sdk = Claude Max plan
  max_concurrency: 8              # how many summaries run at once
  models:                         # per role. litellm names = <provider>/<model>
    daily:   anthropic/claude-sonnet-4-6
    weekly:  anthropic/claude-opus-4-8
    monthly: anthropic/claude-opus-4-8
    curator: anthropic/claude-opus-4-8
  max_raw_messages:               # LLM-INPUT cap: most raw msgs from a window packed INTO one summary
    daily: 0                      # call, per cadence (controls prompt size / token cost).
    weekly: 0                     # This is what the model reads. 0 = send the whole window (no cap).
    monthly: 0
  # API keys live in .env (ANTHROPIC_API_KEY / OPENAI_API_KEY / GEMINI_API_KEY …).
  # provider: agent_sdk uses your Claude Max session — `claude setup-token`, no key needed.

# ── 3. SERVER ─ where state.json is owned & served (a VPS or an always-on Mac mini) ──
server:
  url: ""                         # COLLECTOR: where the chat.db host pushes raw. blank = the local server
                                  # on THIS machine (all-in-one Mac mini); set = https://triage.yourhost.com
  bind: "127.0.0.1:8787"          # SERVER: host:port `serve` listens on. 0.0.0.0 to expose on a LAN/VPS.
  raw_store_days: 0               # SERVER RETENTION: how long raw message TEXT is kept on the server for
                                  # later look-back (not summaries, not sent to the model). 0 = keep forever.
  mcp_default_lookback_days: 60   # MCP: get_context/get_raw_history with no `since` return only the last
                                  # N days (the store keeps all; clients ask for older with an explicit since). 0 = no default.
  schedule:
    timezone: auto                # auto = the Mac's system timezone
    daily:   ["on_open", "21:00"]
    weekly:  ["mon 03:00"]
    monthly: ["1 03:00"]
  bootstrap_limit: 0              # caps conversations per UNATTENDED summary run (scheduler + /trigger),
                                  # incl. the one-time bootstrap monthly. Set low (e.g. 20) for cheap dev testing. 0 = uncapped.
  live:
    mode: interval                # interval = poll every N s | watch = FSEvents (later)
    interval_seconds: 30

# ── 4. TAGS ─ edit watch.md (loose prose; the pipeline compiles it) ──────────
